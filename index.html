<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To-do List</title>
  <link rel="stylesheet" href="dist/output.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex justify-center items-center min-h-screen">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-md">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">To-do List</h1>
      <button id="themeToggle"
        class=" px-2 py-1 text-lg rounded  bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 ">🌙</button>
    </div>

    <!-- input -->
    <div class="flex mb-4">
      <input id="taskInput" type="text" placeholder="Add a new task"
        class="flex-grow border rounded-l  border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-100">
      <button id="addBtn" class="text-white bg-blue-500 rounded-r hover:bg-blue-600 px-4 py-2">Add</button>
    </div>

    <!-- filter -->
    <div class="flex justify-center gap-4 mb-4">
      <button class="filterBtn px-3 py-1 rounded bg-blue-500 text-white" data-filter="all">All</button>
      <button class="filterBtn px-3 py-1 rounded  bg-gray-200 text-black dark:bg-gray-700 dark:text-gray-100 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300" data-filter="active">Active</button>
      <button class="filterBtn px-3 py-1 rounded  bg-gray-200 text-black dark:bg-gray-700 dark:text-gray-100 hover:bg-gray-300 dark:hover:bg-gray-600" data-filter="completed">Completed</button>
    </div>

    <ul id="taskList" class="space-y-2">
      
    </ul>
  </div>



  <script src="src/main.js"></script>
</body>

</html>
